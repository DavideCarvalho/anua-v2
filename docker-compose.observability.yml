services:
  jaeger:
    image: jaegertracing/all-in-one:1.63.0
    ports:
      - '16686:16686'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ['--config=/etc/otelcol-contrib/config.yaml']
    volumes:
      - ./docker/otel/collector.local.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - '4317:4317'
      - '4318:4318'
    depends_on:
      - jaeger
