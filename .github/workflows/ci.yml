name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  queue-tests:
    name: Queue Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: anua_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d anua_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3333
      HOST: 127.0.0.1
      APP_KEY: 0123456789abcdef0123456789abcdef
      LOG_LEVEL: error
      SESSION_DRIVER: cookie
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: anua_test
      DB_POOL_MAX: 1
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_USER: test
      SMTP_PASSWORD: test
      SMTP_FROM_EMAIL: test@example.com
      DRIVE_DISK: fs
      ASAAS_API_KEY: test
      ASAAS_WEBHOOK_URL: https://example.com/webhook
      ASAAS_WEBHOOK_TOKEN: test
      QUEUE_DRIVER: sync

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: node ace migration:run --force

      - name: Run queue tests
        run: npm run test:queue

      - name: Typecheck
        run: npm run typecheck
