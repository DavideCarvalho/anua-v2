name: Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: anua-480822
  REGION: southamerica-east1
  SERVICE_NAME: production-anua-v2-api
  REGISTRY: southamerica-east1-docker.pkg.dev
  REPOSITORY: anua-v2-docker
  IMAGE_NAME: api

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Typecheck (backend)
        run: pnpm run typecheck

      - name: Typecheck (inertia)
        run: pnpm run typecheck:inertia

      - name: Typecheck (tests)
        run: pnpm exec tsc --noEmit -p tests/tsconfig.json

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: anua_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d anua_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3333
      HOST: localhost
      APP_KEY: 0123456789abcdef0123456789abcdef
      LOG_LEVEL: error
      SESSION_DRIVER: cookie
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: anua_test
      DB_POOL_MAX: 5
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_USER: test
      SMTP_PASSWORD: test
      SMTP_FROM_EMAIL: test@example.com
      DRIVE_DISK: fs
      VITE_API_URL: 'http://localhost:3333'
      ASAAS_API_KEY: test
      ASAAS_WEBHOOK_URL: https://example.com/webhook
      ASAAS_WEBHOOK_TOKEN: test
      QUEUE_DRIVER: sync

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Clear Vite cache
        run: rm -rf node_modules/.vite

      - name: Build frontend
        run: pnpm run build

      - name: Migrate, verify schema, and run tests
        run: |
          node ace migration:fresh --force
          node ace migration:status
          psql "postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_DATABASE}" -c "SELECT to_regclass('\"Role\"') AS role_table, to_regclass('rate_limits') AS rate_limits_table;"
          pnpm test

  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL="/" \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image to Artifact Registry
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy services and update jobs (parallel)
        run: |
          # Deploy API
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --startup-probe="initialDelaySeconds=10,timeoutSeconds=10,periodSeconds=10,failureThreshold=3,httpGet.path=/,httpGet.port=3333" \
            --update-env-vars="NODE_ENV=production,HOST=0.0.0.0,TZ=UTC,LOG_LEVEL=info,APP_NAME=Anua,APP_VERSION=0.0.0,SESSION_DRIVER=cookie,DB_HOST=34.39.158.54,DB_PORT=5432,DB_USER=app_user,DB_DATABASE=school_super_app,SMTP_HOST=smtp.resend.com,SMTP_PORT=465,SMTP_USER=resend,SMTP_FROM_EMAIL=Anuá <dont-reply@transactional.anuaapp.com.br>,DRIVE_DISK=gcs,GCS_BUCKET=${{ env.PROJECT_ID }}-uploads,OTEL_SERVICE_NAME=Anua,OTEL_EXPORT_TARGET=posthog,POSTHOG_OTEL_ENDPOINT_BASE=https://us.i.posthog.com/i,EVLOG_ENABLED=true,EVLOG_DRAIN_TARGET=posthog,EVLOG_POSTHOG_HOST=https://us.i.posthog.com" \
            --update-secrets="APP_KEY=production-anua-v2-app-key:latest,DB_PASSWORD=production-anua-v2-db-password:latest,SMTP_PASSWORD=production-anua-v2-smtp-password:latest,ASAAS_API_KEY=production-anua-v2-asaas-api-key:latest,ASAAS_WEBHOOK_URL=production-anua-v2-asaas-webhook-url:latest,ASAAS_WEBHOOK_TOKEN=production-anua-v2-asaas-webhook-token:latest,POSTHOG_PROJECT_TOKEN=production-anua-v2-posthog-project-token:latest" \
            --quiet &

          # Deploy Queue Worker
          gcloud run services update production-anua-v2-queue-worker \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --quiet &

          # Update Cloud Run Jobs with new image
          gcloud run jobs update production-anua-v2-dispatch-missing-payments \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --quiet &

          gcloud run jobs update production-anua-v2-dispatch-invoices \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --quiet &

          gcloud run jobs update production-anua-v2-dispatch-overdue \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --quiet &

          wait

      - name: Show deployed services
        run: |
          echo "Deployed services:"
          echo "API: $(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')"
          echo "Queue Worker: $(gcloud run services describe production-anua-v2-queue-worker --region=${{ env.REGION }} --format='value(status.url)')"
